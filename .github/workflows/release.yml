name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Single-File Executables
        shell: pwsh
        run: |
          .\publish.cmd

      - name: Prepare Release Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "publish/Light/PrimeVideoSpeedApp.exe" "dist/PrimeVideoSpeedApp-Light.exe"
          Copy-Item "publish/Standalone/PrimeVideoSpeedApp.exe" "dist/PrimeVideoSpeedApp-Standalone.exe"

      - name: Upload Artifacts to Workflow Run
        uses: actions/upload-artifact@v4
        with:
          name: PrimeVideoSpeedApp-Binaries
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
